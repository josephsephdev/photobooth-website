    <body>
      <script>
        // Redirect path-based URLs to hash-based URLs for HashRouter.
        // Handles Appwrite verification/OAuth links like /verify-email?userId=x&secret=y
        // by converting them to /#/verify-email?userId=x&secret=y
        (function () {
          var path = window.location.pathname;
          if (path && path !== '/' && !window.location.hash) {
            var search = window.location.search || '';
            window.location.replace('/#' + path + search);
          }
        })();
      </script>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
