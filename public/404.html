<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Redirecting…</title>
  <script>
    // GitHub Pages SPA redirect for HashRouter
    // Converts path-based URLs to hash-based URLs so the React app can handle them.
    // e.g. /signin?source=desktop&redirect=...
    //   → /#/signin?source=desktop&redirect=...
    (function () {
      var fullPath = window.location.pathname;

      // Only redirect if there's an actual route to preserve
      if (fullPath && fullPath !== '/') {
        var search = window.location.search || '';
        var newUrl = '/#' + fullPath + search;
        window.location.replace(newUrl);
      } else {
        // No route — just go to the root
        window.location.replace('/');
      }
    })();
  </script>
</head>
<body>
  <p>Redirecting…</p>
</body>
</html>
